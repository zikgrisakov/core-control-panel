<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Core Control Panel</title>
</head>
<body>
  <h1>Core Control Panel</h1>

  <input id="keyInput" placeholder="FRIEND-001">
  <button onclick="addKey()">Создать ключ</button>

  <hr>

  <button onclick="loadKeys()">Обновить список</button>

  <table border="1" cellpadding="8">
    <thead>
      <tr>
        <th>Ключ</th>
        <th>Device ID</th>
        <th>Статус</th>
        <th>Действия</th>
      </tr>
    </thead>
    <tbody id="keysTable"></tbody>
  </table>

  <script src="app.js"></script>
</body>
</html>
